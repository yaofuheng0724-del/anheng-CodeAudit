  - id: deepaudit.cpp.insecure-memcpy-overlap
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ memcpy 源和目标可能重叠。请使用 memmove。"
    pattern: memcpy($DEST, $SRC, $N)

  - id: deepaudit.cpp.insecure-printf-format
    languages: [c, cpp]
    severity: ERROR
    message: "C/C++ printf 使用用户输入作为格式字符串，存在格式化字符串漏洞。"
    pattern-either:
      - pattern: printf($INPUT)
      - pattern: fprintf($FP, $INPUT)

  - id: deepaudit.cpp.insecure-system
    languages: [c, cpp]
    severity: ERROR
    message: "C/C++ system() 使用用户输入，存在命令注入风险。请使用 execve。"
    pattern: system($INPUT)

  - id: deepaudit.cpp.insecure-popen
    languages: [c, cpp]
    severity: ERROR
    message: "C/C++ popen() 使用用户输入，存在命令注入风险。请避免使用。"
    pattern: popen($INPUT, ...)

  - id: deepaudit.cpp.insecure-execvp
    languages: [cpp]
    severity: WARNING
    message: "C/C++ execvp 使用用户输入，确保输入已验证。"
    pattern: execvp($CMD, $ARGS)

  - id: deepaudit.cpp.insecure-chmod
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ chmod 设置过于宽松的权限。请使用更严格的权限。"
    pattern-either:
      - pattern: chmod(..., 0777)
      - pattern: fchmod(..., 0666)

  - id: deepaudit.cpp.insecure-mktemp
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ mktemp 不安全，存在竞争条件。请使用 mkstemp。"
    pattern: mktemp($TEMPLATE)

  - id: deepaudit.cpp.insecure-tempnam
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ tempnam 不安全，存在竞争条件。请使用 mkstemp。"
    pattern: tempnam(...)

  - id: deepaudit.cpp.insecure-rand
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ rand() 不应用于安全场景。请使用 arc4random 或 crypto 库。"
    pattern: rand()

  - id: deepaudit.cpp.insecure-srandom
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ srand 使用时间作为种子，可预测。请使用更强的种子。"
    pattern: srand(time(NULL))

  - id: deepaudit.cpp.insecure-md5
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ MD5 哈希不安全。请使用 SHA-256 或更强的算法。"
    pattern-either:
      - pattern: MD5_Init(...)
      - pattern: MD5_Update(...)
      - pattern: MD5_Final(...)

  - id: deepaudit.cpp.insecure-sha1
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ SHA-1 哈希不安全。请使用 SHA-256 或更强的算法。"
    pattern-either:
      - pattern: SHA1_Init(...)
      - pattern: SHA1_Update(...)
      - pattern: SHA1_Final(...)

  - id: deepaudit.cpp.insecure-des
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ DES 加密不安全。请使用 AES-256。"
    pattern-either:
      - pattern: DES_set_key(...)
      - pattern: DES_ecb_encrypt(...)

  - id: deepaudit.cpp.insecure-rc4
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ RC4 加密不安全。请使用 AES-256-GCM。"
    pattern: RC4_set_key(...)

  - id: deepaudit.cpp.insecure-ssl-verify-none
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ OpenSSL 禁用证书验证，存在中间人攻击风险。请启用验证。"
    pattern-either:
      - pattern: SSL_CTX_set_verify(..., SSL_VERIFY_NONE, ...)
      - pattern: SSL_set_verify(..., SSL_VERIFY_NONE, ...)

  - id: deepaudit.cpp.insecure-sslv3
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ 使用 SSLv3 协议，不安全。请使用 TLS 1.2+。"
    pattern-either:
      - pattern: SSL_CTX_new(SSLv3_method())
      - pattern: SSL_CTX_new(SSLv3_server_method())
      - pattern: SSL_CTX_new(SSLv3_client_method())

  - id: deepaudit.cpp.insecure-tlsv10
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ 使用 TLS 1.0 协议，较旧。请使用 TLS 1.2+。"
    pattern-either:
      - pattern: SSL_CTX_new(TLSv1_method())
      - pattern: SSL_CTX_new(TLSv1_server_method())
      - pattern: SSL_CTX_new(TLSv1_client_method())

  - id: deepaudit.cpp.insecure-sscanf
    languages: [c, cpp]
    severity: WARNING
    message: "C/C++ sscanf %s 不安全。请指定字段宽度。"
    pattern: sscanf($INPUT, "%s", $BUF)

  - id: deepaudit.cpp.insecure-strtok
    languages: [c, cpp]
    severity: INFO
    message: "C/C++ strtok 不是线程安全的。请使用 strtok_r。"
    pattern: strtok(...)

  - id: deepaudit.cpp.insecure-getenv
    languages: [c, cpp]
    severity: INFO
    message: "C/C++ getenv 返回值可能被修改。请复制结果。"
