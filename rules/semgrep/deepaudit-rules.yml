    pattern: rdb.Eval($INPUT, ...)

  - id: deepaudit.go.insecure-mgo-query
    languages: [go]
    severity: ERROR
    message: "mgo (MongoDB) 使用 $where 操作符，存在 NoSQL 注入风险。请避免使用。"
    pattern: collection.Find(bson.M{"$where": $INPUT})

  - id: deepaudit.go.insecure-file-permission
    languages: [go]
    severity: WARNING
    message: "Go 文件权限过于宽松。请使用更严格的权限。"
    pattern-either:
