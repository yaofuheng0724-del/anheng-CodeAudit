  - id: deepaudit.cpp.insecure-ctime
    languages: [c, cpp]
    severity: INFO
    message: "C/C++ ctime 使用静态缓冲区，不是线程安全的。请使用 ctime_r。"
    pattern: ctime(...)

  - id: deepaudit.cpp.insecure-asctime
