    pattern: strcpy($DEST, $SRC)

  - id: deepaudit.cpp.insecure-strcat
    languages: [c, cpp]
    severity: ERROR
    message: "C/C++ strcat 不安全，可能导致缓冲区溢出。请使用 strncat 或 strlcat。"
    pattern: strcat($DEST, $SRC)

  - id: deepaudit.cpp.insecure-sprintf
    languages: [c, cpp]
