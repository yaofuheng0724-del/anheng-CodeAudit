  - id: deepaudit.javascript.insecure-nestjs-cors
    languages: [javascript, typescript]
    severity: WARNING
    message: "NestJS CORS 使用通配符，可能过于宽松。请指定允许的 origin。"
    pattern: new CorsModule({ origin: "*" })

  - id: deepaudit.javascript.insecure-prisma-sql
    languages: [javascript, typescript]
    severity: ERROR
    message: "Prisma $queryRaw 使用字符串拼接，存在 SQL 注入风险。请使用参数化。"
    pattern: prisma.$queryRaw($SQL + $INPUT)

  - id: deepaudit.javascript.insecure-typeorm-sql
