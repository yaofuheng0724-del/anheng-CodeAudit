    languages: [java]
    severity: INFO
    message: "Retrofit 转换器配置，请确保安全处理响应。"
    pattern: addConverterFactory(...)

  - id: deepaudit.java.insecure-jackson-type-resolver
    languages: [java]
    severity: WARNING
    message: "Jackson 启用多态类型处理可能存在反序列化风险。请谨慎使用。"
    pattern: @JsonTypeInfo(use = Id.CLASS, ...)

  - id: deepaudit.java.insecure-gson-fromjson
    languages: [java]
    severity: WARNING
    message: "Gson fromJson 使用用户输入，可能存在风险。请验证输入。"
    pattern: new Gson().fromJson($INPUT, ...)

